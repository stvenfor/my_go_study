# config.go 使用 Viper 加载 YAML 配置，并支持环境变量覆盖。

server:
  port: 8080
  mode: debug

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: my_go_study
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime_minutes: 30

redis:
  addr: localhost:6379
  password: ""
  db: 0

jwt:
  secret: change-me-in-production
  expire_hours: 72

supabase:
  url: ""
  anon_key: ""
  service_role_key: ""

log:
  level: info
  file: logs/app.log
  max_size: 100
  max_backups: 7
  max_age: 30
  compress: true
